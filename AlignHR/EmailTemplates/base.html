<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{Subject}}</title>
</head>
<body style="margin:0;padding:0;background-color:#F4F5F7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F4F5F7;padding:32px 0;">
    <tr>
      <td align="center">

        <!-- Card -->
        <table width="580" cellpadding="0" cellspacing="0" border="0"
               style="background:#ffffff;border-radius:8px;border:1px solid #E5E7EB;overflow:hidden;max-width:580px;width:100%;">

          <!-- Header -->
          <tr>
            <td style="background-color:#111827;padding:20px 28px;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="background:#ffffff;border-radius:6px;width:30px;height:30px;text-align:center;vertical-align:middle;font-size:13px;font-weight:800;color:#111827;letter-spacing:-1px;">
                    A
                  </td>
                  <td style="padding-left:10px;color:#ffffff;font-size:15px;font-weight:600;letter-spacing:-0.3px;vertical-align:middle;">
                    AlignHR
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:28px 28px 20px;">

              <!-- Greeting -->
              <p style="margin:0 0 16px;font-size:16px;font-weight:600;color:#111827;">
                {{Greeting}}
              </p>

              <!-- Main message -->
              <p style="margin:0 0 20px;font-size:14px;line-height:1.65;color:#374151;">
                {{Body}}
              </p>

              <!-- Details box (shown when {{Details}} is not empty) -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0"
                     style="background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;margin-bottom:20px;">
                <tr>
                  <td style="padding:16px 18px;">
                    {{Details}}
                  </td>
                </tr>
              </table>

              <!-- CTA button (shown when {{CtaLink}} is not empty) -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:20px;">
                <tr>
                  <td align="center">
                    <a href="{{CtaLink}}"
                       style="display:inline-block;background-color:#111827;color:#ffffff;text-decoration:none;font-size:14px;font-weight:600;padding:11px 30px;border-radius:6px;letter-spacing:-0.1px;">
                      {{CtaText}}
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Closing -->
              <p style="margin:0;font-size:13px;line-height:1.6;color:#6B7280;">
                {{Closing}}
              </p>

            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 28px;">
              <hr style="border:none;border-top:1px solid #E5E7EB;margin:0;" />
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#F9FAFB;padding:16px 28px;text-align:center;">
              <p style="margin:0 0 4px;font-size:12px;color:#9CA3AF;">
                AlignHR &middot; Recruitment Management System
              </p>
              <p style="margin:0;font-size:12px;color:#9CA3AF;">
                <a href="#" style="color:#9CA3AF;">Unsubscribe</a>
                &nbsp;&middot;&nbsp;
                <a href="#" style="color:#9CA3AF;">Privacy Policy</a>
              </p>
            </td>
          </tr>

        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>

</body>
</html>
